apiVersion: v1
kind: ServiceAccount
metadata:
  name: healthcare-sa
  namespace: healthcare-insurance
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: healthcare-insurance
  name: healthcare-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: healthcare-rolebinding
  namespace: healthcare-insurance
subjects:
- kind: ServiceAccount
  name: healthcare-sa
  namespace: healthcare-insurance
roleRef:
  kind: Role
  name: healthcare-role
  apiGroup: rbac.authorization.k8s.io
